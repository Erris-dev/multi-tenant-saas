# The name of this workflow as it appears in the GitHub Actions tab
name: CI - Docker Build and Test

# This workflow is triggered on a push to the specified branches
on:
  push:
    branches:
      - develop
      - production  
  pull_request:
    branches:
      - develop

jobs:
  build-and-test-docker-image:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Log in to a container registry
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Set up build metadata.
      # We explicitly tag the image with the commit's unique SHA.
      # This ensures the CD pipeline can find the exact image that was built and tested.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # The key change is here: we tag the image with the commit SHA
          tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/multi-Tenant-PMSaaS:${{ github.sha }}
