name: CI

on:
  push:
    branches:
      - development
      - production
  pull_request:
    branches:
      - development

permissions:
  contents: read
  id-token: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
        
      - name: Install Dependencies
        working-directory: ./backend
        run: npm install 

      - name: Hello World Action
        uses: actions/hello-world-javascript-action@v1


      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/460674569272/locations/global/workloadIdentityPools/cloud-pool/providers/github-provider 
          service_account: gha-cloudrun-deployer@msaas-470316.iam.gserviceaccount.com

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: msaas-470316

      - name: Configure Docker for Google Cloud
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE=europe-west1-docker.pkg.dev/msaas-470316/multi-tenant-saas/backend:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
