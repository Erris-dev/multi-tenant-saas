name: CD - Docker Deploy to Production (GCP)

on:
    push:
        branches:
            - production

jobs:
    deploy:
        runs-on: ubuntu-latest

        permissions:
            contents: read
        
        environment:
            name: production

        steps:
            # Step 1: Use a Google-provided action to authenticate with GCP.
            - name: 'Authenticate to Google Cloud'
              id: 'auth'
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.GCP_SA_KEY }}

            # Step 2: Use another Google-provided action to set the GCP project ID.
            # This is cleaner and more robust than using a run script.
            - name: 'Set GCP project ID'
              id: 'set-project-id'
              uses: google-github-actions/set-project@v2
              with:
                  project_id: ${{ secrets.GCP_PROJECT_ID }}

            # Step 3: Deploy the Docker image to Google Cloud Run.
            # This action handles the 'gcloud run deploy' command for you.
            - name: 'Deploy to Cloud Run'
              id: 'deploy'
              uses: google-github-actions/deploy-cloudrun@v2
              with:
                  service: multi-tenant-pmsaas-backend
                  # This is the corrected image path. It uses the commit SHA to
                  # reference the exact image built for this specific commit.
                  image: 'europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/multi-tenant-pmsaas:${{ github.sha }}'
                  region: europe-west1
                  metadata: |
                      annotations:
                          run.googleapis.com/ingress: all
                          run.googleapis.com/launch-stage: production
                          run.googleapis.com/client-name: github-actions-deploy
